apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projects
  namespace: gitops
spec:
  project: gitops
  source:
    repoURL: https://github.com/danfoster/zem-gitops
    targetRevision: main
    path: clusters/cluster04/projects
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
