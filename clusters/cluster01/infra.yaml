apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/zemlab/zem-gitops
    # Pinned during the repo-split Phase 2 cutover so this cluster is isolated
    # from changes to main until deliberately bumped. See incident 2026-07-17/18
    # (targetRevision pinning alone does NOT isolate project-generator, which
    # tracks main independently — see the redesigned Phase 2 plan's manualSync
    # gate). Revert to `main` once all 3 clusters are confirmed stable on the
    # new bridge.
    targetRevision: b4ac38c8714e93fc2d881e9fb7242800f327e94e
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster01
        features:
          openebs:
            enabled: true
          metallb:
            enabled: true
          metallb-configs:
            enabled: true
            values:
              addresses:
                - 10.42.2.210-10.42.2.220
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c1"
          smartctl-exporter:
            enabled: true
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster01
          kyverno:
            enabled: true
          registry-auth:
            enabled: true
            extraDestinationNamespaces:
              - awx-prod
            values:
              namespaces:
                - awx-prod
          project-credentials:
            enabled: true
            values:
              namespaces:
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
