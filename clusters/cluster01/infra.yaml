apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/zemlab/zem-gitops
    # REVERTED 2026-07-19: Phase 2 Step 4 cutover caused cross-cluster damage
    # despite this pin, because project-generator's own targetRevision is
    # hardcoded to "main" (independent of infra's pin) throughout the whole
    # downstream chain. Pinning infra alone does NOT isolate a cluster. Back
    # to the known-safe SHA until the isolation mechanism is redesigned.
    targetRevision: 12e32e723bc7fc4edf0310f688a3b5b3f43a29ae
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster01
        features:
          openebs:
            enabled: true
          metallb:
            enabled: true
          metallb-configs:
            enabled: true
            values:
              addresses:
                - 10.42.2.210-10.42.2.220
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c1"
          smartctl-exporter:
            enabled: true
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster01
          kyverno:
            enabled: true
          registry-auth:
            enabled: true
            extraDestinationNamespaces:
              - awx-prod
            values:
              namespaces:
                - awx-prod
          project-credentials:
            enabled: true
            values:
              namespaces:
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
