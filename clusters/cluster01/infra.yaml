apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/zemlab/zem-gitops
    # Phase 2 cutover: bumped to the bridge-flip commit. cluster03/04 remain
    # pinned to the pre-cutover SHA until this is verified stable here.
    targetRevision: 10761500f0f23e0a91b41cf9a695301b63c83995
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster01
        features:
          openebs:
            enabled: true
          metallb:
            enabled: true
          metallb-configs:
            enabled: true
            values:
              addresses:
                - 10.42.2.210-10.42.2.220
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c1"
          smartctl-exporter:
            enabled: true
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster01
          kyverno:
            enabled: true
          registry-auth:
            enabled: true
            extraDestinationNamespaces:
              - awx-prod
            values:
              namespaces:
                - awx-prod
          project-credentials:
            enabled: true
            values:
              namespaces:
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
