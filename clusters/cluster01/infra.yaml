apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/zemlab/zem-gitops
    # Pinned during the infra ApplicationSet migration (Step 1) so this cluster
    # is isolated from changes to main until deliberately bumped. See the
    # redesigned migration plan. Revert to `main` once cluster01 is confirmed
    # stable on the new infra-features ApplicationSet (Step 7).
    targetRevision: 0df25eec2858a0bec293db8884fb88fc769039e3
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster01
        features:
          openebs:
            enabled: true
          metallb:
            enabled: true
          metallb-configs:
            enabled: true
            values:
              addresses:
                - 10.42.2.210-10.42.2.220
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c1"
          smartctl-exporter:
            enabled: true
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster01
          kyverno:
            enabled: true
          registry-auth:
            enabled: true
            extraDestinationNamespaces:
              - awx-prod
            values:
              namespaces:
                - awx-prod
          project-credentials:
            enabled: true
            values:
              namespaces:
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  # No automated sync policy (Step 2 of the infra ApplicationSet migration):
  # the old app-of-apps must not fight the new infra-features ApplicationSet
  # while it adopts these same feature Applications. Re-add once this whole
  # Application is removed at the end of the migration -- it never should be,
  # since removal (Step 6) happens before that would matter.
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
