apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-prod
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/danfoster/zem-gitops
    targetRevision: main
    path: deployments/project
    helm:
      valueFiles:
        - projects/awx.yaml
      valuesObject:
        env: prod
        cluster: cluster01
        common:
          values:
            b2:
              prefix: "cluster01/awx-prod"
            ociVault:
              vaultOcid: "ocid1.vault.oc1.uk-london-1.eruxsrmlaafja.abwgiljridwbzbxrs2vvay6b6n6x7xhi3ymapbgov36lrqmm7bkxgh3hmnka"
              compartmentOcid: "ocid1.compartment.oc1..aaaaaaaagyawjldswlrq2f2dnsqz2kqlzsvj6mirpcue7oqwzlyuwx7pqjha"
              region: "uk-london-1"
              tenancyOcid: "ocid1.tenancy.oc1..aaaaaaaach2wyrgzdlf65xepx7rsyod6qdm65tx6timbqiecdi2hlsqqnxca"
              userOcid: "ocid1.user.oc1..aaaaaaaaxowfdpcr5524uplyquost4jr3hpzf2eqr4ejjciir5dbx3eigrfa"
              credentialSecretName: "awx-prod-oci-creds"
        services:
          awx:
            values:
              awx:
                hostname: awx
                storageClass: openebs-hostpath
          project-common:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
