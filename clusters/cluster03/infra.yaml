apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/zemlab/zem-gitops
    targetRevision: main
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster03
        features:
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c3"
          ingress-nginx:
            enabled: true
            values:
              controller:
                service:
                  annotations:
                    oci.oraclecloud.com/load-balancer-type: "nlb"
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster03
          cloudflare-ingress:
            enabled: true
            values:
              externalSecret:
                remoteRefKey: infra-cloudflare-ingress-cluster03
          mariadb-operator:
            enabled: true
          oci-mysql:
            enabled: true
            namespace: oci-mysql
            source:
              repoURL: https://github.com/zemlab/zem-gitops
              targetRevision: main
              path: apps/infra/zem-external-dbs
            values:
              oci:
                rootSecretName: infra-mysql-admin-password
              mysql:
                host: "10.44.0.209"
                instanceName: "oci-mysql"
              backup:
                enabled: true
                vaultSecretName: infra-mysql-backup
                b2:
                  prefix: cluster03/mysql
              applications:
                - name: "pce-prod"
                  namespace: "pce-prod"
          csi-snapshotter:
            enabled: true
          velero:
            # Disabled 2026-07-20: was Degraded (see Task #19). Part of the plan
            # for OCI-native PVC backups but never finished being wired up.
            # Revisit when picking that work back up -- values kept below.
            enabled: false
            values:
              oci:
                enabled: true
                objectStorage:
                  namespace: "axoxdievda5j"
                  bucket: "velero-cluster03"
                  prefix: ""
                  accessKeyIdBWSecret: "velero-cluster03-os-access-key-id"
                  secretAccessKeyBWSecret: "velero-cluster03-os-secret-access-key"
              velero:
                credentials:
                  existingSecret: velero-oci-os-credentials
                deployNodeAgent: false
                configuration:
                  defaultVolumesToFsBackup: false
          project-credentials:
            enabled: true
            values:
              namespaces: []
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
      - /spec/syncPolicy