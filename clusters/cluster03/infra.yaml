apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/danfoster/zem-gitops
    targetRevision: main
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster03
        features:
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c3"
          ingress-nginx:
            enabled: true
            values:
              controller:
                service:
                  annotations:
                    oci.oraclecloud.com/load-balancer-type: "nlb"
          longhorn:
            enabled: false
            values:
              ingress:
                hostname: longhorn-cluster03
          cloudflare-ingress:
            enabled: true
            values:
              externalSecret:
                remoteRefKey: infra-cloudflare-ingress-cluster03
          mariadb-operator:
            enabled: true
          oci-mysql:
            enabled: true
            namespace: oci-mysql
            source:
              repoURL: https://github.com/danfoster/zem-gitops
              targetRevision: main
              path: apps/infra/zem-external-dbs
            values:
              oci:
                vaultOcid: ocid1.vault.oc1.uk-london-1.eruxsrmlaafja.abwgiljridwbzbxrs2vvay6b6n6x7xhi3ymapbgov36lrqmm7bkxgh3hmnka
                compartmentOcid: ocid1.compartment.oc1..aaaaaaaagyawjldswlrq2f2dnsqz2kqlzsvj6mirpcue7oqwzlyuwx7pqjha
                # rootSecretOcid: ocid1.key.oc1.uk-london-1.eruxsrmlaafja.abwgiljtncunmpibvwvjygia2d3umhb6vf24axjuxuivbg52moq76tgdhdua
                rootSecretOcid: mysql-admin-password
              mysql:
                host: "10.44.0.209"
                instanceName: "oci-mysql"
              backup:
                enabled: true
                vaultSecretName: infra-mysql-backup
                b2:
                  prefix: cluster03/mysql
              applications:
                - name: "pce-prod"
                  namespace: "pce-prod"
          velero:
            enabled: true
            values:
              oci:
                enabled: true
                objectStorage:
                  namespace: "axoxdievda5j"
                  bucket: "velero-cluster03"
                  prefix: ""
                  accessKeyIdBWSecret: "velero-cluster03-os-access-key-id"
                  secretAccessKeyBWSecret: "velero-cluster03-os-secret-access-key"
                blockVolume:
                  compartmentOCID: "ocid1.compartment.oc1..aaaaaaaagyawjldswlrq2f2dnsqz2kqlzsvj6mirpcue7oqwzlyuwx7pqjha"
              velero:
                credentials:
                  existingSecret: velero-oci-os-credentials
                deployNodeAgent: false
                configuration:
                  defaultVolumesToFsBackup: false
                initContainers:
                  - name: velero-plugin-for-aws
                    image: docker.io/velero/velero-plugin-for-aws:v1.11.0
                    imagePullPolicy: IfNotPresent
                    volumeMounts:
                      - mountPath: /target
                        name: plugins
                  - name: velero-plugin-for-oci
                    image: ghcr.io/oracle/velero-plugin-for-oci:v1.0.0
                    imagePullPolicy: IfNotPresent
                    volumeMounts:
                      - mountPath: /target
                        name: plugins
                extraVolumes:
                  - name: oci-config
                    secret:
                      secretName: velero-oci-config
                extraVolumeMounts:
                  - name: oci-config
                    mountPath: /root/.oci
          project-credentials:
            enabled: true
            values:
              namespaces: []
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
      - /spec/syncPolicy