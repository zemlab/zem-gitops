apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zenith-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/danfoster/zem-gitops
    targetRevision: main
    path: deployments/project
    helm:
      valueFiles:
        - projects/zenith.yaml
      valuesObject:
        env: prod
        cluster: cluster02
        common:
          values:
            ociVault:
              vaultOcid: "ocid1.vault.oc1.uk-london-1.eruxsrmlaafja.abwgiljridwbzbxrs2vvay6b6n6x7xhi3ymapbgov36lrqmm7bkxgh3hmnka"
              compartmentOcid: "ocid1.compartment.oc1..aaaaaaaagyawjldswlrq2f2dnsqz2kqlzsvj6mirpcue7oqwzlyuwx7pqjha"
              region: "uk-london-1"
              tenancyOcid: "ocid1.tenancy.oc1..aaaaaaaach2wyrgzdlf65xepx7rsyod6qdm65tx6timbqiecdi2hlsqqnxca"
              userOcid: "ocid1.user.oc1..aaaaaaaajpxug7ehv4xazz5lrvyisd2mhrrzfs2a7pqm4qm7qc4gj5jyitaq"
              credentialSecretName: "zenith-prod-oci-creds"
        services:
          backups:
            enabled: true
          backend:
            enabled: true
          frontend:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
