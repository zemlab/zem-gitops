apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: gitops
  source:
    repoURL: https://github.com/danfoster/zem-gitops
    targetRevision: main
    path: deployments/infra
    helm:
      valuesObject:
        common:
          values:
            cluster:
              name: cluster02
        features:
          metallb:
            enabled: true
          metallb-configs:
            enabled: true
            values:
              addresses:
                - "209.16.157.32/32"
          externaldns:
            enabled: true
            values:
              external-dns:
                txtOwnerId: "zem-c2"
          longhorn:
            enabled: true
            values:
              ingress:
                hostname: longhorn-cluster02
              longhorn:
                defaultSettings:
                  guaranteedInstanceManagerCPU: 5
                  concurrentReplicaRebuildPerNodeLimit: 3
                  concurrentBackingImageReplenishPerNodeLimit: 3
                longhornManager:
                  resources:
                    requests:
                      memory: "256Mi"
                    limits:
                      memory: "512Mi"
                longhornDriver:
                  resources:
                    requests:
                      memory: "64Mi"
                    limits:
                      memory: "128Mi"
                longhornUI:
                  resources:
                    requests:
                      memory: "64Mi"
                    limits:
                      memory: "128Mi"
          cloudflared:
            enabled: true
            values:
              externalSecret:
                remoteRefKey: cloudflared-token-cluster02
          project-credentials:
            enabled: true
            values:
              namespaces:
                - name: zem-external-prod
                  vaultSecretName: infra-zem-external-prod-oci-credentials
                  targetNamespace: zem-external-prod
                - name: zenith-prod
                  vaultSecretName: infra-zenith-prod-oci-credentials
                  targetNamespace: zenith-prod
          kyverno:
            enabled: true
          registry-auth:
            enabled: true
            extraDestinationNamespaces:
              - zenith-prod
            values:
              namespaces:
                - zenith-prod
          cnpg:
            enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/syncPolicy
