kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cluster04
  namespace: gitops
spec:
  destination:
    namespace: gitops
    server: https://kubernetes.default.svc
  project: gitops
  source:
    path: clusters/cluster04
    repoURL: https://github.com/danfoster/zem-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
