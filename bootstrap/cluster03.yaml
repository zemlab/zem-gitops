kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cluster03
  namespace: gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: gitops
    server: https://kubernetes.default.svc
  project: gitops
  source:
    path: clusters/cluster03
    repoURL: git@gitlab.com:zemlab/zem-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
