kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cluster03
  namespace: gitops
spec:
  destination:
    namespace: gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    path: clusters/cluster03
    repoURL: https://github.com/danfoster/zem-gitops.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
