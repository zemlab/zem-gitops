name: CI Pipeline for zem-gitops

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pre-commit-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install pre-commit
        run: |
          python -m pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files

      - name: Run Helm lint and template tests
        run: |
          # Lint and test Helm charts in infra directory
          helm lint apps/infra/zem-argocd/
          helm template test deployments/infra -f clusters/cluster01/infra.yaml

      - name: Check for secrets in diff
        run: |
          git diff --name-only HEAD | xargs detect-secrets --baseline .secrets.baseline

  helm-chart-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Helm
        run: |
          curl https://helm.repo/helm-v3.11.2-linux-amd64.tar.gz | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/

      - name: Run Helm lint for all charts
        run: |
          find apps/infra/ -name Chart.yaml -exec dirname {} \; | xargs -I {} helm lint {}

      - name: Run Helm template tests
        run: |
          # Test infra app-of-apps
          helm template test deployments/infra -f clusters/cluster01/infra.yaml

          # Test project app-of-apps
          helm template test deployments/project -f clusters/cluster01/projects.yaml

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install detect-secrets
        run: |
          python -m pip install detect-secrets

      - name: Run secret detection
        run: |
          detect-secrets --baseline .secrets.baseline

  kubernetes-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install kubectl
        run: |
          curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Run kubectl validation
        run: |
          # Validate cluster configurations
          kubectl get clusters

      - name: Run kubectl describe
        run: |
          # Example: kubectl describe cluster cluster01
          kubectl describe cluster cluster01

  velero-backup-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Velero
        run: |
          curl -L https://velero.io/releases/velero-v1.15.0-linux-amd64.tar.gz | tar xz
          sudo mv velero-v1.15.0-linux-amd64/velero /usr/local/bin/

      - name: Run Velero backup validation
        run: |
          # Example: velero get backups
          velero get backups

      - name: Run Velero restore test
        run: |
          # Example: velero restore test
          velero restore test

  argocd-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Argo CD CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml | kubectl apply -f -

      - name: Run Argo CD validation
        run: |
          # Example: argocd get apps
          argocd get apps

      - name: Run Argo CD sync
        run: |
          # Example: argocd sync
          argocd sync

  helm-template-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Helm
        run: |
          curl https://helm.repo/helm-v3.11.2-linux-amd64.tar.gz | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/

      - name: Run Helm template tests
        run: |
          # Test infra app-of-apps
          helm template test deployments/infra -f clusters/cluster01/infra.yaml

          # Test project app-of-apps
          helm template test deployments/project -f clusters/cluster01/projects.yaml

  helm-lint-test:
