tailscaleEgress:
  - name: awx-egress
    fqdn: awx.shark-puffin.ts.net
    ports:
      - port: 443

gitlab-runner:
  gitlabUrl: https://gitlab.com/
  rbac:
    create: true
  metrics:
    enabled: true
  probeTimeoutSeconds: 10
  # Shadow /usr/bin/gitlab-runner with a wrapper at /usr/local/bin/ (higher PATH priority)
  # to fix broken --url= flag in `gitlab-runner verify` (runner 17.9+ regression, upstream chart bug)
  volumes:
    - name: gitlab-runner-wrapper
      configMap:
        name: gitlab-runner-wrapper
        defaultMode: 0755
  volumeMounts:
    - name: gitlab-runner-wrapper
      mountPath: /usr/local/bin/gitlab-runner
      subPath: gitlab-runner
  extraObjects:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: gitlab-runner-wrapper
        namespace: "{{ .Release.Namespace }}"
      data:
        gitlab-runner: |
          #!/bin/sh
          # Wrapper: strip --url= from verify calls (broken in runner 17.9+, upstream chart bug)
          case "$1" in
            verify) exec /usr/bin/gitlab-runner verify ;;
            *)      exec /usr/bin/gitlab-runner "$@" ;;
          esac
  extraEnvFrom:
    CI_SERVER_TOKEN:
      secretKeyRef:
        name: gitlab-runner-token
        key: runner-token
  runners:
    config: |
      [[runners]]
        [runners.custom_build_dir]
          enabled = false
        [runners.kubernetes]
          namespace = "{{.Release.Namespace}}"
          image = "alpine:latest"
          cpu_request = "100m"
          memory_request = "1Gi"
          cpu_limit = "2"
          memory_limit = "4Gi"
          service_cpu_request = "100m"
          service_memory_request = "128Mi"
