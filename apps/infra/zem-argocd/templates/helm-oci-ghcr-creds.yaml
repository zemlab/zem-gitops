{{- if .Values.globals.ghcrAppInstallID }}
# ArgoCD repository secret for OCI Helm charts on GHCR.
# Uses username/password — githubApp* fields are only supported for type: git, not type: helm.
# Password is a GitHub App installation token (1h TTL), rotated every 30m by ESO.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zem-ghcr-helm-creds
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
spec:
  refreshInterval: 30m
  target:
    name: zem-ghcr-helm-creds
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: helm
        name: ghcr-zemlab-apps
        url: ghcr.io/zemlab/apps/charts
        enableOCI: "true"
        username: zem-gitops
        password: "{{ `{{.token}}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: ghcr-zemlab-token
{{- end }}
