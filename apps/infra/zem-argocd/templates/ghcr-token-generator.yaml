{{- if .Values.globals.ghcrAppInstallID }}
# ClusterGenerator — mints a fresh GitHub App installation token every refreshInterval.
# Consumed by:
#   - helm-oci-ghcr-creds.yaml (ArgoCD OCI Helm repo auth)
#   - apps/infra/zem-registry-auth externalsecret-ghcr.yaml (imagePullSecret)
# The generated token is used as the GHCR registry password; username can be any non-empty string.
apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: ghcr-zemlab-token
spec:
  kind: GithubAccessToken
  generator:
    githubAccessTokenSpec:
      appID: "4159736"
      installID: {{ .Values.globals.ghcrAppInstallID | quote }}
      permissions:
        packages: "read"
        metadata: "read"
      auth:
        privateKey:
          secretRef:
            name: zem-ghcr-app-key
            namespace: argocd
            key: privateKey
{{- end }}
