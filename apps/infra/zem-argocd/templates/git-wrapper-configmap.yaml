apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-git-wrapper
  namespace: argocd
data:
  git: |
    #!/bin/bash
    # GitLab SHA-fetch compatibility wrapper.
    #
    # GitLab disables uploadpack.allowReachableSHA1InWant, so
    # `git fetch origin <sha>` returns "not our ref" for ANY sha,
    # even the branch HEAD. ArgoCD's Checkout() path does not fall
    # back after this failure, causing a persistent sync error.
    #
    # This wrapper detects the pattern and converts it to a full
    # branch fetch, which GitLab does support.
    for REAL_GIT in /usr/bin/git /usr/local/bin/git; do
      [[ -x "$REAL_GIT" ]] && break
    done
    if [[ "$1" == "fetch" && $# -ge 3 && "$3" =~ ^[0-9a-f]{40}$ ]]; then
      exec "$REAL_GIT" fetch "$2" --tags --force --prune
    fi
    exec "$REAL_GIT" "$@"
