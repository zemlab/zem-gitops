argo-cd:
  configs:
    cm:
      create: false
    params:
      server.insecure: true
      application.namespaces: "gitops"
      applicationsetcontroller.namespaces: "gitops"
      applicationsetcontroller.enable.scm.providers: "false"
      controller.status.processors: 10
      controller.operation.processors: 5
    rbac:
      policy.default: role:readonly
      policy.csv: |
        g, dan@zem.org.uk, role:admin
      scopes: "[email]"
  controller:
    env:
      - name: GOMEMLIMIT
        value: "890MiB"
    resources:
      requests:
        memory: 512Mi
      limits:
        memory: 1Gi
  server:
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 256Mi
  repoServer:
    env:
      - name: ARGOCD_EXEC_TIMEOUT
        value: "60s"
      - name: PATH
        value: "/custom-git:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - name: git-wrapper
        configMap:
          name: argocd-git-wrapper
          defaultMode: 0755
    volumeMounts:
      - name: git-wrapper
        mountPath: /custom-git
    extraArgs:
      - --parallelismlimit
      - "2"
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi
  redis:
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
  dex:
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 128Mi
  applicationSet:
    enabled: false
globals:
  domain: argocd-cluster01.shark-puffin.ts.net
