apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: registry-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: zem-infra
    kind: ClusterSecretStore
  target:
    name: gitlab-registry
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      metadata:
        {{- if .Values.namespaces }}
        annotations:
          replicator.v1.mittwald.de/replicate-to: {{ .Values.namespaces | join "," | quote }}
        {{- end }}
      data:
        .dockerconfigjson: '{"auths":{"registry.gitlab.com":{"username":"{{ `{{.username}}` }}","password":"{{ `{{.password}}` }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: "gitlab-registry-username"
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: "gitlab-registry-password"
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
