{{- if .Values.ghcrNamespaces }}
# imagePullSecret for ghcr.io/zemlab images, replicated to all ghcrNamespaces.
# Token is a GitHub App installation token (1h TTL), rotated every 30m by ESO.
# Requires the ClusterGenerator ghcr-zemlab-token (apps/infra/zem-argocd) to be deployed first.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: registry-auth
spec:
  refreshInterval: 30m
  target:
    name: ghcr-credentials
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      metadata:
        annotations:
          replicator.v1.mittwald.de/replicate-to: {{ .Values.ghcrNamespaces | join "," | quote }}
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"zem-gitops","password":"{{ `{{.token}}` }}"}}}'
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: ghcr-zemlab-token
{{- end }}
