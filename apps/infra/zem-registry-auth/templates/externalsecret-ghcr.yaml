{{- if .Values.ghcrNamespaces }}
# imagePullSecret for ghcr.io/zemlab private images, replicated to all ghcrNamespaces.
# Uses a fine-grained GitHub PAT (packages:read for zemlab org) stored in Bitwarden.
# Bitwarden key: zemlab-ghcr-read-pat
# To rotate: update the Bitwarden secret; ESO will pick it up within refreshInterval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: registry-auth
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: zem-infra
    kind: ClusterSecretStore
  target:
    name: ghcr-credentials
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      metadata:
        annotations:
          replicator.v1.mittwald.de/replicate-to: {{ .Values.ghcrNamespaces | join "," | quote }}
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"danfoster","password":"{{ `{{.ghcrToken}}` }}"}}}'
  data:
    - secretKey: ghcrToken
      remoteRef:
        key: "zemlab-ghcr-read-pat"
{{- end }}
