{{- if and .Values.backup.b2AccessKeyIdSecret .Values.backup.b2SecretAccessKeySecret }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-backup-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: zem-infra
    kind: ClusterSecretStore
  target:
    name: longhorn-backup-secret
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: "{{ `{{.access_key_id}}` }}"
        AWS_SECRET_ACCESS_KEY: "{{ `{{.secret_access_key}}` }}"
        AWS_ENDPOINTS: "https://s3.eu-central-003.backblazeb2.com"
  data:
    - secretKey: access_key_id
      remoteRef:
        key: {{ .Values.backup.b2AccessKeyIdSecret | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: secret_access_key
      remoteRef:
        key: {{ .Values.backup.b2SecretAccessKeySecret | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
