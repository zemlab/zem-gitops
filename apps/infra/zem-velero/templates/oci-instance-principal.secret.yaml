{{- if .Values.oci.enabled }}
# Non-sensitive: instructs OCI SDK to use instance principal (no keys stored here)
apiVersion: v1
kind: Secret
metadata:
  name: velero-oci-config
  labels:
    app.kubernetes.io/name: velero
stringData:
  config: |
    [DEFAULT]
    auth=instance_principal
    region={{ .Values.oci.blockVolume.region }}
{{- end }}
