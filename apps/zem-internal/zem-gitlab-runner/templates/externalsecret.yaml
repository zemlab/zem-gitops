apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: SecretStore
  target:
    name: gitlab-runner-token
  data:
    - secretKey: runner-token
      remoteRef:
        key: cluster02-zem-internal-prod-gitlab-runner-token
        property: runner-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
