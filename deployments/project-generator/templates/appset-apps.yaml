{{- include "project-generator.validate" . -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-apps
  namespace: gitops
spec:
  generators:
    - matrix:
        generators:
          # Gen 1: project-level env files — one per project-env on this cluster
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.targetRevision }}
              files:
                - path: "projects/*/envs/{{ .Values.cluster }}/*.yaml"
          # Gen 2: Merge(env files [base, presence=enabled] + app.yaml [source override])
          - merge:
              mergeKeys:
                - path[2]
              generators:
                # Base: env file presence = app enabled for this env
                - git:
                    repoURL: {{ .Values.repoURL }}
                    revision: {{ .Values.targetRevision }}
                    files:
                      - path: "projects/{{`{{path[1]}}`}}/*/envs/{{`{{path.filenameNormalized}}`}}.yaml"
                # Override: source + releaseName from app.yaml
                - git:
                    repoURL: {{ .Values.repoURL }}
                    revision: {{ .Values.targetRevision }}
                    files:
                      - path: "projects/{{`{{path[1]}}`}}/*/app.yaml"
  template:
    metadata:
      name: "{{`{{path[2]}}`}}-{{`{{path.filenameNormalized}}`}}"
      namespace: gitops
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: "{{`{{path[1]}}`}}-{{`{{path.filenameNormalized}}`}}"
      sources:
        # The app's Helm chart
        - repoURL: "{{`{{source.repoURL}}`}}"
          targetRevision: "{{`{{source.targetRevision}}`}}"
          path: "{{`{{source.path}}`}}"
          helm:
            releaseName: "{{`{{releaseName}}`}}"
            ignoreMissingValueFiles: true
            valueFiles:
              # Shared app values (optional — skipped if missing)
              - $gitops/projects/{{`{{path[1]}}`}}/{{`{{path[2]}}`}}/values.yaml
              # Env-specific overrides (always present — this is the base generator file)
              - $gitops/projects/{{`{{path[1]}}`}}/{{`{{path[2]}}`}}/envs/{{`{{path.filenameNormalized}}`}}.yaml
        # Gitops repo ref for valueFiles above
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          ref: gitops
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{`{{path[1]}}`}}-{{`{{path.filenameNormalized}}`}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
