{{- include "project-generator.validate" . -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-instances
  namespace: gitops
spec:
  # Prevents cascading deletion of live resources if this ApplicationSet ever
  # removes a generated Application (e.g. generator hiccup during a repo/path
  # change) — only the Application bookkeeping is removed, not the underlying
  # workload. See incident 2026-07-17/18: without this, a transient generator
  # error during a bridge-repo cutover pruned live PVCs across all 3 clusters.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - git:
        repoURL: {{ .Values.repoURL }}
        revision: {{ .Values.targetRevision }}
        files:
          - path: "projects/*/envs/{{ .Values.cluster.name }}/*.yaml"
  template:
    metadata:
      name: "project-instance-{{`{{path[1]}}`}}-{{`{{env}}`}}"
      namespace: gitops
      labels:
        project: "{{`{{path[1]}}`}}"
        env: "{{`{{env}}`}}"
        role: project-instance
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: gitops
      source:
        repoURL: {{ .Values.repoURL }}
        targetRevision: {{ .Values.targetRevision }}
        path: deployments/project-instance
        helm:
          releaseName: "project-instance-{{`{{path[1]}}`}}-{{`{{env}}`}}"
          valuesObject:
            name: "{{`{{path[1]}}`}}"
            env: "{{`{{env}}`}}"
            cluster: {{ .Values.cluster.name | quote }}
            repoURL: {{ .Values.repoURL | quote }}
            targetRevision: {{ .Values.targetRevision | quote }}
            iamVaultSecretName: "{{`{{ociVault.iamVaultSecretName}}`}}"
            extraSourceRepoURL: "{{`{{extraSourceRepoURL}}`}}"
            manualSync: {{ .Values.manualSync }}
      destination:
        server: https://kubernetes.default.svc
        namespace: gitops
      {{- if not .Values.manualSync }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      {{- else }}
      syncPolicy: {}
      {{- end }}
