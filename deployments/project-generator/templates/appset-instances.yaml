{{- include "project-generator.validate" . -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-instances
  namespace: gitops
spec:
  generators:
    - git:
        repoURL: {{ .Values.repoURL }}
        revision: {{ .Values.targetRevision }}
        files:
          - path: "projects/*/envs/{{ .Values.cluster }}/*.yaml"
  template:
    metadata:
      name: "project-instance-{{`{{path[1]}}`}}-{{`{{env}}`}}"
      namespace: gitops
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: gitops
      sources:
        # The project-instance Helm chart
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          path: deployments/project-instance
          helm:
            releaseName: "project-instance-{{`{{path[1]}}`}}-{{`{{env}}`}}"
            valuesObject:
              name: "{{`{{path[1]}}`}}"
              env: "{{`{{env}}`}}"
              cluster: {{ .Values.cluster | quote }}
              repoURL: {{ .Values.repoURL | quote }}
              targetRevision: {{ .Values.targetRevision | quote }}
            ignoreMissingValueFiles: true
            valueFiles:
              # Env file provides ociVault, b2, and any other project-level config
              - $gitops/projects/{{`{{path[1]}}`}}/envs/{{ .Values.cluster }}/{{`{{env}}`}}.yaml
        # Gitops repo ref for valueFiles above
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          ref: gitops
      destination:
        server: https://kubernetes.default.svc
        namespace: gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
