{{- include "project-instance.validate" . -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-apps-{{ include "project-instance.fullName" . }}
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - merge:
        mergeKeys:
          - path[2]
        generators:
          # Base: presence of env file = app enabled for this project-env
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.targetRevision }}
              files:
                - path: "projects/{{ .Values.name }}/*/envs/{{ .Values.env }}.yaml"
          # Override: source + releaseName from app.yaml
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.targetRevision }}
              files:
                - path: "projects/{{ .Values.name }}/*/app.yaml"
  template:
    metadata:
      name: "{{ .Values.name }}-{{`{{ index .path.segments 2 }}`}}-{{ .Values.env }}"
      namespace: gitops
      labels:
        project: {{ .Values.name }}
        env: {{ .Values.env }}
        role: app
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: {{ include "project-instance.fullName" . }}
      sources:
        # Supports both git path sources and OCI/Helm chart sources.
        # chart: defaults to "" (git source) when not set in app.yaml — no explicit chart: "" needed.
        - repoURL: "{{`{{ .source.repoURL }}`}}"
          targetRevision: "{{`{{ .source.targetRevision }}`}}"
          path: "{{`{{ default "" .source.path }}`}}"
          chart: "{{`{{ default "" .source.chart }}`}}"
          helm:
            releaseName: "{{`{{ .releaseName }}`}}"
            ignoreMissingValueFiles: true
            valueFiles:
              - $gitops/projects/{{ .Values.name }}/values.yaml
              - $gitops/projects/{{ .Values.name }}/{{`{{ index .path.segments 2 }}`}}/values.yaml
              - $gitops/projects/{{ .Values.name }}/{{`{{ index .path.segments 2 }}`}}/envs/{{ .Values.env }}.yaml
        # Gitops repo ref for valueFiles above.
        # Uses static Helm values (not app source values) so OCI chart apps also get the correct ref.
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          ref: gitops
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ include "project-instance.fullName" . }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      # Tailscale operator rewrites spec.externalName on egress Services after creation.
      # Ignore this field to prevent perpetual OutOfSync on apps using tailscale egress.
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/externalName
