{{- include "project-instance.validate" . -}}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project-apps-{{ include "project-instance.fullName" . }}
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - merge:
        mergeKeys:
          - path[2]
        generators:
          # Base: presence of env file = app enabled for this project-env
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.targetRevision }}
              files:
                - path: "projects/{{ .Values.name }}/*/envs/{{ .Values.env }}.yaml"
          # Override: source + releaseName from app.yaml
          - git:
              repoURL: {{ .Values.repoURL }}
              revision: {{ .Values.targetRevision }}
              files:
                - path: "projects/{{ .Values.name }}/*/app.yaml"
  template:
    metadata:
      name: "{{ .Values.name }}-{{`{{path[2]}}`}}-{{ .Values.env }}"
      namespace: gitops
      annotations:
        argocd.argoproj.io/sync-wave: "1"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: {{ include "project-instance.fullName" . }}
      sources:
        # The app's Helm chart — supports both git path sources and OCI/Helm chart sources.
        # For git sources: path is set, chart is empty. For OCI sources: chart is set, path is empty.
        - repoURL: "{{`{{source.repoURL}}`}}"
          targetRevision: "{{`{{source.targetRevision}}`}}"
          path: "{{`{{source.path}}`}}"
          chart: "{{`{{source.chart}}`}}"
          helm:
            releaseName: "{{`{{releaseName}}`}}"
            ignoreMissingValueFiles: true
            valueFiles:
              - $gitops/projects/{{ .Values.name }}/values.yaml
              - $gitops/projects/{{ .Values.name }}/{{`{{path[2]}}`}}/values.yaml
              - $gitops/projects/{{ .Values.name }}/{{`{{path[2]}}`}}/envs/{{ .Values.env }}.yaml
        # Gitops repo ref for valueFiles above.
        # Uses static Helm values (not app source values) so OCI chart apps also get the correct ref.
        - repoURL: {{ .Values.repoURL }}
          targetRevision: {{ .Values.targetRevision }}
          ref: gitops
      destination:
        server: https://kubernetes.default.svc
        namespace: {{ include "project-instance.fullName" . }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
      # Tailscale operator rewrites spec.externalName on egress Services after creation.
      # Ignore this field to prevent perpetual OutOfSync on apps using tailscale egress.
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/externalName
