name: gitlab

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

extraSourceRepos:
  - "https://charts.gitlab.io"

services:
  project-common:
    enabled: false
    nameOverride: "project-common-gitlab"
    releaseName: "project-common-gitlab-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-project-common
  gitlab-runner:
    enabled: true
    releaseName: "gitlab-runner"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-gitlab/zem-gitlab-runner
