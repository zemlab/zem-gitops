name: media

extraSourceRepos:
  - "https://github.com/jellyfin/jellyfin-helm"

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

services:
  project-common:
    enabled: false
    nameOverride: "project-common-media"
    releaseName: "project-common-media-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-project-common
  plex:
    enabled: true
    releaseName: "plex"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/media/plex
  radarr:
    enabled: true
    releaseName: "radarr"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/media/radarr
  sonarr:
    enabled: true
    releaseName: "sonarr"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/media/sonarr
  transmission:
    enabled: true
    releaseName: "transmission"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/media/transmission
  samba:
    enabled: true
    releaseName: "samba"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/media/samba
