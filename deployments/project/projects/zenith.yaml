name: zenith

extraSourceRepos:
  - "registry.gitlab.com/zemlab/zenith/charts"

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

services:
  project-common:
    enabled: false
    nameOverride: "project-common-zenith"
    releaseName: "project-common-zenith-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-project-common

  backend:
    enabled: true
    nameOverride: zenith-backend
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts
      chart: backend

  frontend:
    enabled: true
    nameOverride: zenith-frontend
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts
      chart: frontend

  db:
    enabled: true
    nameOverride: zenith-db
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts
      chart: db

  www:
    enabled: false
    nameOverride: zenith-www
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts
      chart: www
