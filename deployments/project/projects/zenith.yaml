name: zenith

extraSourceRepos:
  - "registry.gitlab.com/zemlab/zenith/charts/backend"
  - "registry.gitlab.com/zemlab/zenith/charts/frontend"

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

services:
  backups:
    enabled: false
    nameOverride: "backups-zenith"
    releaseName: "backups-zenith-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-backups

  backend:
    enabled: true
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts/backend
      chart: backend
      targetRevision: 0.1.0

  frontend:
    enabled: true
    source:
      repoURL: registry.gitlab.com/zemlab/zenith/charts/frontend
      chart: frontend
      targetRevision: 0.1.0
