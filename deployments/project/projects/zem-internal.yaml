name: zem-internal

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

extraSourceRepos:
  - "https://victoriametrics.github.io/helm-charts/"
  - "https://grafana.github.io/helm-charts"
  - "https://charts.gitlab.io"

services:
  project-common:
    enabled: false
    nameOverride: "project-common-zem-internal"
    releaseName: "project-common-zem-internal-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-project-common
  gitlab-runner:
    enabled: true
    releaseName: "gitlab-runner"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-internal/zem-gitlab-runner
  homepage:
    enabled: true
    releaseName: "homepage"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-internal/zem-homepage
    ignoreDifferences:
      - kind: Service
        jsonPointers:
          - /spec/externalName
