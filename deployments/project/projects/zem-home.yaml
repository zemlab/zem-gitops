name: zem-home

services:
  homeassistant:
    enabled: true
    releaseName: "homeassistant"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-home/zem-homeassistant
    ignoreDifferences:
      - kind: Service
        jsonPointers:
          - /spec/externalName
