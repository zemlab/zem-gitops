name: pce

extraSourceRepos:
  - "https://github.com/zemlab/golinks"
  - "ghcr.io/zemlab/golinks-helm"

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

services:
  backups:
    enabled: false
    nameOverride: "backups-pce"
    releaseName: "backups-pce-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-backups
  wordpress:
    enabled: true
    nameOverride: "pce-wordpress"
    releaseName: "pce-wordpress"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-external/wordpress
    values:
      db:
        host: "10.44.0.209"
        name: "pce-prod-db"
        userSecretRef:
          name: mysql-pce-prod-creds
    ignoreDifferences:
      - group: argoproj.io
        kind: Application
        jsonPointers:
          - /spec/syncPolicy
  www:
    enabled: true
    nameOverride: "pce-www"
    releaseName: "pce-www"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/pce/pce-www
  golinks:
    enabled: true
    nameOverride: "pce-golinks"
    releaseName: "pce-golinks"
    source:
      repoURL: ghcr.io/zemlab/golinks-helm
      chart: golinks
      targetRevision: 1.0.0-864c710
    values:
      redirects:
        - from: /map/fort-kinnard
          to: https://portycommunityenergy.wordpress.com/easy-cycle-routes-from-portobello-porty-prom-to-fort-kinnaird
        - from: /map/meadows
          to: https://portycommunityenergy.wordpress.com/easy-cycle-rides-from-portobello-porty-prom-to-the-meadows
        - from: /map/qmu
          to: https://portycommunityenergy.wordpress.com/easy-cycle-rides-from-portobello-porty-prom-to-queen-margaret-university
        - from: /map/leith-links
          to: https://portycommunityenergy.wordpress.com/easy-cycle-rides-to-portobello-porty-prom-to-leith-links
      ingress:
        hostname: go.portycommunityenergy.org
