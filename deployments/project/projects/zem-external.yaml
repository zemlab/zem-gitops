name: zem-external

common:
  values:
    ociVault:
      vaultOcid: ""
      compartmentOcid: ""
      region: "uk-london-1"
      tenancyOcid: ""
      userOcid: ""
      credentialSecretName: ""

services:
  backups:
    enabled: false
    nameOverride: "backups-zem-external"
    releaseName: "backups-zem-external-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/infra/zem-backups
  echo:
    enabled: true
    releaseName: "echo-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-external/echo
    ignoreDifferences:
      - group: argoproj.io
        kind: Application
        jsonPointers:
          - /spec/syncPolicy
  wiki:
    enabled: true
    releaseName: "wiki-prod"
    source:
      repoURL: https://github.com/danfoster/zem-gitops
      targetRevision: main
      path: apps/zem-external/wiki
    values:
      hostname: wiki.zem.org.uk
    ignoreDifferences:
      - group: argoproj.io
        kind: Application
        jsonPointers:
          - /spec/syncPolicy
