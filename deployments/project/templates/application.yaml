{{- $chart := .Values.name -}}
{{- $env := .Values.env -}}
{{- $cluster := .Values.cluster | default "" -}}
{{ range $name, $config := .Values.services }}
{{- if $config.enabled }}
{{- if not $config.source -}}
  {{- fail (printf "\n\nERROR: Service '%s' is enabled but missing the 'source' configuration block in values!" $name) -}}
{{- end -}}
{{- $appName := printf "%s-%s" ($config.nameOverride | default $name) $env -}}
{{- $releaseName := $config.releaseName | default $name -}}
{{- $b2 := dict -}}
{{- if $cluster -}}
{{- $b2 = dict "b2" (dict "prefix" (printf "%s/%s-%s" $cluster $chart $env) "vaultSecretName" (printf "%s-%s-%s-backups" $cluster $chart $env)) -}}
{{- end -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName }}
  namespace: argocd
spec:
  project: {{ $chart }}-{{ $env }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  source:
    {{- toYaml $config.source | nindent 4 }}
    helm:
      releaseName: {{ $releaseName }}
      {{- $merged := dict }}
      {{- $merged := mustMerge $merged ($config.values | default dict) }}
      {{- $merged := mustMerge $merged ($.Values.common.values | default dict) }}
      {{- $merged := mustMerge $merged $b2 }}
      {{- if $merged }}
      valuesObject:
        {{- toYaml $merged | nindent 8 }}
      {{- end }}
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $chart }}-{{ $env }}
{{- if $config.ignoreDifferences }}
  ignoreDifferences:
    {{- toYaml $config.ignoreDifferences | nindent 4 }}
{{- end }}
{{- end }}
{{ end }}
