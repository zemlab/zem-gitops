releaseName: mailpit

ingress:
  enabled: false

extraDeploy:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: mailpit-tailscale
      annotations:
        tailscale.com/tags: "tag:mailpit-staging"
    spec:
      ingressClassName: tailscale
      tls:
        - hosts:
            - mailpit-staging
      defaultBackend:
        service:
          name: mailpit-http
          port:
            number: 80
