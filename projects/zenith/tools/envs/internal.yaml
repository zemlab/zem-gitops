releaseName: tools
source:
  targetRevision: 0.0.0-594b1ce4

image:
  tag: fix-frontend-version-static-env
  pullPolicy: Always

# namespace.create is false — project-instance manages zenith-internal namespace
namespace:
  create: false
  name: zenith-internal

dump:
  enabled: true
  barmanServerName: db-cluster
  barmanCredsVaultSecret: zenith-internal-barman-creds
  b2WriteCredsVaultSecret: zenith-internal-b2-write
  saltVaultSecret: zenith-internal-anonymize-salt

pipeline:
  enabled: true
